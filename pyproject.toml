[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "undef-terminal"
version = "0.1.0"
description = "Shared terminal I/O primitives for the undef ecosystem"
readme = "README.md"
requires-python = ">=3.11"
dependencies = []

[project.optional-dependencies]
websocket = ["fastapi>=0.110"]
ssh       = ["asyncssh>=2.14"]
emulator  = ["pyte>=0.8"]
cli       = ["fastapi>=0.110", "uvicorn>=0.24", "websockets>=12.0"]
all       = ["fastapi>=0.110", "asyncssh>=2.14", "pyte>=0.8", "uvicorn>=0.24", "websockets>=12.0"]

[project.scripts]
undefterm = "undef.terminal.cli:main"
undefterm-server = "undef.terminal.server.cli:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
"undef.terminal" = ["frontend/*"]

[dependency-groups]
dev = [
    "asyncssh>=2.22.0",
    "bandit>=1.9",
    "codespell>=2.4.1",
    "httpx>=0.27",
    "hypothesis>=6.151.9",
    "mypy>=1.19",
    "pre-commit>=4.0",
    "pyte>=0.8.2",
    "pytest>=9.0",
    "pytest-asyncio>=1.3",
    "pytest-cov>=7.0",
    "pytest-playwright>=0.7.2",
    "pytest-xdist>=3.8",
    "reuse>=6.2.0",
    "ruff>=0.15",
    "ty>=0.0.17",
    "uv>=0.10.7",
    "websockets>=16.0",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
testpaths = ["tests"]
addopts = [
    "--import-mode=importlib",
    "-v",
    "--strict-markers",
    "--strict-config",
    "--tb=short",
    "-ra",
]

[tool.ruff]
line-length = 120
target-version = "py311"

[tool.ruff.lint]
select = [
    "E",
    "W",
    "F",
    "I",
    "N",
    "UP",
    "B",
    "C4",
    "SIM",
    "TCH",
    "PTH",
    "DTZ",
    "ICN",
    "ISC",
    "PERF",
    "PIE",
    "RET",
    "RSE",
    "TID",
    "S",
    "ARG",
    "RUF",
]
ignore = ["E501", "S104", "S112", "S311"]

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["F401", "RUF022"]
"tests/**/*.py" = ["E402", "B905", "S101", "S110", "ARG", "RUF003", "RUF012", "RUF015", "RUF043", "RUF059"]

[tool.coverage.run]
source = ["undef"]
omit = ["tests/*"]

[tool.coverage.report]
show_missing = true
skip_covered = false

[tool.mypy]
python_version = "3.11"
strict = true
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_any_generics = true
check_untyped_defs = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_no_return = true
follow_imports = "normal"
ignore_missing_imports = false
namespace_packages = true
explicit_package_bases = true
mypy_path = ["src"]

[tool.ty.environment]
python-version = "3.11"

[tool.codespell]
skip = ".git,*.pyc,__pycache__,.venv,node_modules,uv.lock,*.mmd"
ignore-words-list = "ore,opps,wont,strat,nd,rade,ans"
