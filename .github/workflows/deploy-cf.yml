name: Deploy CF Worker

on:
  push:
    branches:
      - main
    paths:
      - "packages/undef-terminal-cloudflare/**"
      - "src/**"

  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: packages/undef-terminal-cloudflare

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Sync dependencies
        run: uv sync --group dev
        working-directory: .

      - name: Run unit tests
        run: uv run pytest tests/ -m "not e2e" -q

      - name: Deploy to Cloudflare Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: uv run pywrangler deploy
