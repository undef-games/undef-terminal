name: CI

on:
  push:
    branches:
      - main
      - "rc/**"
  pull_request:
    branches:
      - main
      - "rc/**"
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * *"

permissions:
  contents: read

jobs:
  docs-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: uv sync --group dev
      - run: uv run python scripts/check_docs_accuracy.py

  quality:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npm run build:frontend
      - run: uv sync --group dev
      - run: uv run playwright install chromium
      - run: uv run python scripts/check_max_loc.py --max-lines 500 --baseline .ci/max-loc-baseline.json
      - run: uv run python scripts/check_spdx_headers.py
      - run: uv run python scripts/check_event_literals.py
      - run: uv run ruff format --check packages/undef-terminal/src packages/undef-terminal/tests scripts
      - run: uv run ruff check packages/undef-terminal/src packages/undef-terminal/tests scripts
      - run: uv run mypy packages/undef-terminal/src/
      - run: uv run ty check packages/undef-terminal/src/
      - run: uv run bandit -r packages/undef-terminal/src/ -ll
      - run: uv run xenon --max-absolute B --max-modules B --max-average A packages/undef-terminal/src/
      - run: uv run vulture packages/undef-terminal/src/ packages/undef-terminal/tests/ --ignore-names "since,password,kw,exc_type,tb"
      - run: uv run python -m pip_audit --path .
      - run: uv run python scripts/check_licenses.py
      - run: uv run python scripts/run_pytest_gate.py -q --ignore=packages/undef-terminal/tests/playwright/test_example.py --ignore=packages/undef-terminal/tests/playwright/test_frontend_coverage.py
      - name: Check undef.shell vendor tree
        run: |
          if [ ! -d "packages/undef-terminal-cloudflare/python_modules/undef/shell" ]; then
            echo "ERROR: undef.shell missing from CF vendor tree"
            exit 1
          fi
          if [ -z "$(find packages/undef-terminal-cloudflare/python_modules/undef/shell -name '*.py' -print -quit)" ]; then
            echo "ERROR: undef.shell vendor tree is empty"
            exit 1
          fi
      - run: uv run pytest -q packages/undef-terminal-cloudflare/tests
      - run: uv run python scripts/verify_package_artifacts.py

  pty-unit:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv pip install -e "packages/undef-terminal-pty/[dev]"
      - name: Run PTY unit tests (no PAM/root/native)
        run: uv run pytest packages/undef-terminal-pty/tests/ -q --no-cov --timeout=10 --ignore=packages/undef-terminal-pty/tests/e2e -o "addopts="

  pty-docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build and run PTY Docker test suite (PAM + native libs)
        run: |
          docker build -t undef-pty-test -f packages/undef-terminal-pty/Dockerfile.test packages/undef-terminal-pty/
          docker run --rm undef-pty-test

  windows-process-tree-smoke:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: uv sync --group dev
      - run: uv run pytest packages/undef-terminal/tests/manager/test_process.py -q -k kill_bot_terminates_spawned_child_process_tree --no-cov -vv

  mutation-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: uv sync --group dev
      - name: Run mutation gate (changed-only)
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            uv run python scripts/run_mutation_gate.py --python-version 3.11 --retries 1 --min-mutation-score 100 --changed-only --base-ref "origin/${{ github.base_ref }}"
          elif [ "${{ github.event_name }}" = "push" ] && [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            uv run python scripts/run_mutation_gate.py --python-version 3.11 --retries 1 --min-mutation-score 100 --changed-only --base-ref "${{ github.event.before }}"
          else
            uv run python scripts/run_mutation_gate.py --python-version 3.11 --retries 1 --min-mutation-score 100
          fi

  compliance:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: uvx reuse lint
      - run: uv sync --group dev
      - run: uv run codespell

  release-readiness:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npm run build:frontend
      - run: uv sync --group dev
      - run: uv build --package undef-terminal
      - run: uvx --from twine twine check dist/*

  performance-smoke:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: uv sync --group dev
      - run: uv run python scripts/run_performance_smoke.py --iterations 300000 --enforce

  memory-regression:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: uv sync --group dev
      - name: Run memray stress tests
        run: uv run pytest packages/undef-terminal/tests/memray/ -m memray -v --tb=short --no-cov
      - name: Upload memray artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: memray-output
          path: memray-output/
          retention-days: 30
