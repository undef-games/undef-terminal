name: CI

on:
  push:
    branches:
      - main
      - "rc/**"
  pull_request:
    branches:
      - main
      - "rc/**"
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * *"

permissions:
  contents: read

jobs:
  docs-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: uv sync --group dev
      - run: uv run python scripts/check_docs_accuracy.py

  quality:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --group dev
      - run: uv run playwright install chromium
      - run: uv run python scripts/check_max_loc.py --max-lines 500 --baseline .ci/max-loc-baseline.json
      - run: uv run python scripts/check_spdx_headers.py
      - run: uv run python scripts/check_event_literals.py
      - run: uv run ruff format --check src tests scripts
      - run: uv run ruff check src tests scripts
      - run: uv run mypy src/
      - run: uv run ty check src/
      - run: uv run bandit -r src/ -ll
      - run: uv run xenon --max-absolute C --max-modules B --max-average A src/
      - run: uv run vulture src/ tests/ --ignore-names "since,password,kw,exc_type,tb"
      - run: uv run python -m pip_audit --path .
      - run: uv run python scripts/check_licenses.py
      - run: uv run python scripts/run_pytest_gate.py -q --ignore=tests/playwright/test_example.py --ignore=tests/playwright/test_frontend_coverage.py
      - run: uv run pytest -q packages/undef-terminal-cloudflare/tests
      - run: uv run python scripts/verify_package_artifacts.py

  windows-process-tree-smoke:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: uv sync --group dev
      - run: uv run pytest tests/manager/test_process.py -q -k kill_bot_terminates_spawned_child_process_tree --no-cov -vv

  mutation-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: uv sync --group dev
      - name: Run mutation gate (changed-only)
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            uv run python scripts/run_mutation_gate.py --python-version 3.11 --retries 1 --min-mutation-score 100 --changed-only --base-ref "origin/${{ github.base_ref }}"
          elif [ "${{ github.event_name }}" = "push" ] && [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            uv run python scripts/run_mutation_gate.py --python-version 3.11 --retries 1 --min-mutation-score 100 --changed-only --base-ref "${{ github.event.before }}"
          else
            uv run python scripts/run_mutation_gate.py --python-version 3.11 --retries 1 --min-mutation-score 100
          fi

  compliance:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: uvx reuse lint
      - run: uv sync --group dev
      - run: uv run codespell

  release-readiness:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: uv sync --group dev
      - run: uv build
      - run: uvx --from twine twine check dist/*

  performance-smoke:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: uv sync --group dev
      - run: uv run python scripts/run_performance_smoke.py --iterations 300000 --enforce

  memory-regression:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: uv sync --group dev
      - name: Run memray stress tests
        run: uv run pytest tests/memray/ -m memray -v --tb=short --no-cov
      - name: Upload memray artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: memray-output
          path: memray-output/
          retention-days: 30
