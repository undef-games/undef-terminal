repos:
  - repo: local
    hooks:
      - id: tsc
        name: TypeScript typecheck
        entry: node_modules/.bin/tsc -p packages/undef-terminal-frontend/tsconfig.json --noEmit
        language: system
        pass_filenames: false
        always_run: false
        types_or: [ts, javascript]

      - id: biome
        name: biome lint+format
        entry: node_modules/.bin/biome ci packages/undef-terminal-frontend/src/
        language: system
        pass_filenames: false
        always_run: false
        types_or: [ts, javascript]

      - id: vitest
        name: vitest frontend tests
        entry: npm test --workspace=packages/undef-terminal-frontend
        language: system
        pass_filenames: false
        always_run: false
        types_or: [ts, javascript]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.2
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/fsfe/reuse-tool
    rev: v6.2.0
    hooks:
      - id: reuse

  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.1
    hooks:
      - id: codespell
        additional_dependencies: ["tomli"]
        exclude: "package-lock\\.json"

  - repo: local
    hooks:
      - id: mypy
        name: mypy strict
        entry: mypy packages/undef-terminal/src/
        language: python
        language_version: python3.11
        additional_dependencies:
          - mypy==1.19.1
          - fastapi>=0.110
          - httpx>=0.27
          - pydantic>=2.0
          - uvicorn>=0.24
          - websockets>=16.0
          - asyncssh>=2.22.0
          - pyte>=0.8.2
          - pyjwt>=2.9
          - fastmcp>=2.0
          - undef-telemetry>=0.3
          - structlog>=24.0
          - textual>=0.50
        pass_filenames: false
        always_run: true
        types: [python]

      - id: ty
        name: ty check
        entry: ty check packages/undef-terminal/src/ packages/undef-terminal-pty/src/
        language: python
        language_version: python3.11
        additional_dependencies:
          - ty==0.0.19
          - fastapi>=0.110
          - httpx>=0.27
          - pydantic>=2.0
          - uvicorn>=0.24
          - websockets>=16.0
          - asyncssh>=2.22.0
          - pyte>=0.8.2
          - pyjwt>=2.9
          - fastmcp>=2.0
          - undef-telemetry>=0.3
          - textual>=0.50
          - structlog>=24.0
        pass_filenames: false
        always_run: true
        types: [python]

      - id: mypy-pty
        name: mypy strict (undef-terminal-pty)
        entry: bash -c 'MYPYPATH=packages/undef-terminal/src:packages/undef-terminal-pty/src mypy packages/undef-terminal-pty/src/undef/'
        language: system
        pass_filenames: false
        always_run: false
        types: [python]

      - id: bandit
        name: bandit
        entry: bandit -r packages/undef-terminal/src/ packages/undef-terminal-pty/src/ -ll
        language: python
        language_version: python3.11
        additional_dependencies:
          - bandit==1.9.4
        pass_filenames: false
        always_run: true
        types: [python]
