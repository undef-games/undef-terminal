[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "undef-terminal-render"
dynamic = ["version"]
description = "ANSI color rendering primitives — palette tables, quantizers, SGR emitters, image conversion"
readme = "README.md"
requires-python = ">=3.11"
license = "AGPL-3.0-or-later"
authors = [{name = "MindTenet LLC"}]
dependencies = []

[project.optional-dependencies]
emulator = ["pyte>=0.8"]
images = ["Pillow>=10.0"]

[tool.setuptools.dynamic]
version = {file = "VERSION"}

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
testpaths = ["tests"]
addopts = [
    "--import-mode=importlib",
    "-v",
    "--strict-markers",
    "--strict-config",
    "--tb=short",
    "-ra",
    "--cov=undef.terminal.render",
    "--cov-branch",
    "--cov-report=term-missing",
    "--cov-fail-under=100",
]

[tool.coverage.run]
source = ["undef.terminal.render"]
branch = true

[tool.coverage.report]
fail_under = 100
show_missing = true
