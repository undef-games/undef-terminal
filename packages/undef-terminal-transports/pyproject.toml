[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "undef-terminal-transports"
dynamic = ["version"]
description = "Network transport implementations (Telnet, SSH, WebSocket) for undef-terminal"
requires-python = ">=3.11"
license = "AGPL-3.0-or-later"
dependencies = []

[project.optional-dependencies]
ssh = ["asyncssh>=2.22.0"]
websocket = ["websockets>=16.0"]
dev = [
    "pytest>=9.0",
    "pytest-asyncio>=1.3",
    "pytest-cov>=7.0",
    "pytest-timeout>=2.4.0",
    "mypy>=1.19",
    "ruff>=0.15",
    "asyncssh>=2.22.0",
    "websockets>=16.0",
]

[tool.setuptools.dynamic]
version = {file = "VERSION"}

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
addopts = [
    "--import-mode=importlib",
    "-v",
    "--strict-markers",
    "--tb=short",
    "-ra",
    "--cov=undef.terminal.transports",
    "--cov-branch",
    "--cov-report=term-missing",
    "--cov-fail-under=100",
]

[tool.ruff]
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "S", "B", "C4", "PTH"]

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = ["S101"]

[tool.mypy]
python_version = "3.11"
strict = true
