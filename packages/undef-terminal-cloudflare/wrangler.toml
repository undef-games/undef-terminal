name = "undef-terminal-cloudflare"
main = "src/undef_terminal_cloudflare/entry.py"
compatibility_date = "2026-03-04"
compatibility_flags = ["python_workers"]

[[durable_objects.bindings]]
name = "SESSION_RUNTIME"
class_name = "SessionRuntime"

[[kv_namespaces]]
# Fleet-wide session registry: each DO writes its status here on connect/disconnect.
# Create with: wrangler kv namespace create SESSION_REGISTRY
# Then replace the id below with the real namespace ID from that command.
binding = "SESSION_REGISTRY"
id = "00000000000000000000000000000000"
preview_id = "00000000000000000000000000000000"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["SessionRuntime"]

[observability]
enabled = true
head_sampling_rate = 1.0
