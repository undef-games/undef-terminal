name = "undef-terminal-cloudflare"
account_id = "0cd7f4f58f13e02c5bf57aa9dc347d1d"
main = "src/undef_terminal_cloudflare/entry.py"
compatibility_date = "2026-03-04"
compatibility_flags = ["python_workers"]

# Bundle JS and CSS files from the ui/static/ directory alongside Python source.
# These are served by assets.py via importlib.resources when undef-terminal is
# not available in the worker runtime (e.g. Docker container, production deploy).
[[rules]]
type = "Text"
globs = ["**/*.js", "**/*.css"]
fallthrough = true

[build]
command = "cp -r ../../src/undef/terminal/frontend/. src/undef_terminal_cloudflare/ui/static/"

[dev]
port = 8788

[vars]
AUTH_MODE = "jwt"
JWT_JWKS_URL = "https://neurotic.cloudflareaccess.com/cdn-cgi/access/certs"
JWT_ISSUER = "https://neurotic.cloudflareaccess.com"
JWT_ALGORITHMS = "RS256"
JWT_DEFAULT_ROLE = "operator"

# Cloudflare Access / Zero Trust JWT configuration (production example):
#
#   AUTH_MODE        = "jwt"
#   JWT_JWKS_URL     = "https://<your-team>.cloudflareaccess.com/cdn-cgi/access/certs"
#   JWT_ISSUER       = "https://<your-team>.cloudflareaccess.com"
#   JWT_AUDIENCE     = "<your-CF-Access-Application-AUD-tag>"
#   JWT_ALGORITHMS   = "RS256"
#   JWT_DEFAULT_ROLE = "operator"   # role assigned to CF Access users (no roles claim by default)
#
# CF Access JWTs carry sub (email), aud (array), iss, iat, exp — but no roles claim.
# JWT_DEFAULT_ROLE sets the fallback role (viewer / operator / admin).
#
# For groups-based roles (finer-grained access control):
#   1. Configure SCIM or CF Access identity groups in the Zero Trust dashboard.
#   2. Add a custom claim (e.g. "groups") to your IdP's CF Access application.
#   3. Set JWT_ROLES_CLAIM=groups so the worker reads roles from that claim.
#      Members of "admin" → admin, "operator" → operator, others → viewer.
#
# Store secrets via: wrangler secret put AUTH_MODE  (or use .dev.vars for local dev)

[[durable_objects.bindings]]
name = "SESSION_RUNTIME"
class_name = "SessionRuntime"

[[kv_namespaces]]
# Fleet-wide session registry: each DO writes its status here on connect/disconnect.
# BEFORE DEPLOYING: replace both placeholder IDs with real namespace IDs.
#   1. Run: wrangler kv namespace create SESSION_REGISTRY
#   2. Run: wrangler kv namespace create SESSION_REGISTRY --preview
#   3. Replace the zeros below with the IDs printed by those commands.
# Without real IDs, GET /api/sessions will return an empty list (no sessions visible).
binding = "SESSION_REGISTRY"
id = "73112ec463934662b4f2891e713d04f9"
preview_id = "45447d3587fc4e4598416a5df9e373e9"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["SessionRuntime"]

[observability]
enabled = true
head_sampling_rate = 1.0
