[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "undef-terminal-cloudflare"
dynamic = ["version"]
description = "Cloudflare Workers runtime for undef-terminal control plane"
readme = "README.md"
requires-python = ">=3.11"
license = "AGPL-3.0-or-later"
authors = [
  {name = "MindTenet LLC"},
]
classifiers = [
  "Development Status :: 4 - Beta",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Topic :: Internet :: WWW/HTTP :: HTTP Servers",
  "Framework :: AsyncIO",
]
dependencies = [
  "pyjwt>=2.9",
  "undef-terminal>=0.3.0",
]

[project.optional-dependencies]
dev = [
  "pytest>=9.0",
  "pytest-asyncio>=1.3",
  "pytest-playwright>=0.5",
  "ruff>=0.15",
  "mypy>=1.19",
  "workers-py>=0.4.0",
  "websockets>=16.0",
]

[project.urls]
Homepage = "https://github.com/undef-games/undef-terminal"
Repository = "https://github.com/undef-games/undef-terminal"

[project.scripts]
uterm-cf = "undef_terminal_cloudflare.cli:main"

[tool.setuptools.dynamic]
version = {file = "VERSION"}

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
markers = [
    "e2e: end-to-end tests against a live pywrangler dev server (skipped by default; use -m e2e or E2E=1)",
    "real_cf: requires real Cloudflare deployment with live KV + full WS support (skipped unless REAL_CF=1)",
    "slow: slow tests (>10s); skipped unless SLOW=1 or REAL_CF=1",
    "playwright: Playwright browser UI tests",
]
addopts = [
    "--cov=undef_terminal_cloudflare",
    "--cov-branch",
    "--cov-report=term-missing",
    "--cov-fail-under=100",
]

[tool.coverage.run]
source = ["undef_terminal_cloudflare"]
branch = true

[tool.coverage.report]
fail_under = 100
show_missing = true
skip_covered = false

[tool.mutmut]
paths_to_mutate = ["src/"]
tests_dir = ["tests/"]
also_copy = ["wrangler.toml"]
pytest_add_cli_args = ["-o", "addopts=", "--no-header", "-q"]
