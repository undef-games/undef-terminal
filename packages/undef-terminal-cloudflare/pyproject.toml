[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "undef-terminal-cloudflare"
version = "0.2.0"
description = "Cloudflare Workers runtime for undef-terminal control plane"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
  "pyjwt>=2.9",
]

[project.optional-dependencies]
ui = [
  "undef-terminal",
]
dev = [
  "pytest>=9.0",
  "pytest-asyncio>=1.3",
  "ruff>=0.15",
  "mypy>=1.19",
  "workers-py>=0.4.0",
  "websockets>=16.0",
]

[project.scripts]
uterm-cf = "undef_terminal_cloudflare.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["src/undef_terminal_cloudflare"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
markers = [
    "e2e: end-to-end tests against a live pywrangler dev server (skipped by default; use -m e2e or E2E=1)",
    "real_cf: requires real Cloudflare deployment with live KV + full WS support (skipped unless REAL_CF=1)",
]
