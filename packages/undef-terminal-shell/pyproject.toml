[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "undef-terminal-shell"
dynamic = ["version"]
description = "Standalone Python REPL shell — usable independently of undef-terminal"
readme = "README.md"
requires-python = ">=3.11"
license = "AGPL-3.0-or-later"
authors = [
  {name = "MindTenet LLC"},
]
dependencies = []

[project.optional-dependencies]
terminal = ["undef-terminal>=0.3.0"]
images = ["Pillow>=10.0", "undef-terminal-render>=0.1"]

[project.scripts]
ushell = "undef.terminal.shell.__main__:main"

[tool.setuptools.dynamic]
version = {file = "VERSION"}

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
testpaths = ["tests"]
addopts = [
    "--import-mode=importlib",
    "-v",
    "--strict-markers",
    "--strict-config",
    "--tb=short",
    "-ra",
    "--cov=undef.terminal.shell",
    "--cov-branch",
    "--cov-report=term-missing",
    "--cov-fail-under=100",
]

[tool.coverage.run]
source = ["undef.terminal.shell"]
branch = true

[tool.coverage.report]
fail_under = 100
show_missing = true
