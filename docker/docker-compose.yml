#
# Brings up both backends for local testing.
#
# Usage:
#   docker compose -f docker/docker-compose.yml up
#
# FastAPI server: http://localhost:8780/app/
# CF worker dev:  http://localhost:8788/api/health
#

services:
  server:
    build:
      context: ..
      dockerfile: docker/Dockerfile.server
    ports:
      - "8780:8780"
    # To use a custom config:
    # volumes:
    #   - ./my-server.toml:/config/server.toml:ro

  cf:
    build:
      context: ..
      dockerfile: docker/Dockerfile.cf
    ports:
      - "8788:8788"
    environment:
      # Override with AUTH_MODE=jwt + JWT_JWKS_URL etc. for production testing.
      AUTH_MODE: "dev"
    # Persist wrangler dev local state between container restarts:
    # volumes:
    #   - wrangler-state:/tmp/.wrangler

# volumes:
#   wrangler-state:
